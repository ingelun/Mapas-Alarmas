<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AlarmMap</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AlarmMap">
<meta name="theme-color" content="#0b0f1a">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');
  :root {
    --bg:#0b0f1a;--panel:#111827;--border:#1e2d45;
    --accent:#00d4ff;--danger:#ff3b5c;--success:#00e896;
    --warning:#ffb800;--text:#e2e8f0;--muted:#4a5568;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .logo{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:2px;}
  .logo span{color:var(--danger);}
  .status-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .status-dot.online{background:var(--success);box-shadow:0 0 6px var(--success);}
  .spinner{width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;display:none;}
  .spinner.active{display:block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-title{padding:14px 18px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;}
  .device-list{flex:1;overflow-y:auto;padding:8px;}
  .device-card{background:#0d1520;border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
  .device-card:hover{border-color:var(--accent);}
  .device-card.alerting{border-color:var(--danger);background:rgba(255,59,92,0.08);animation:card-pulse 1s ease infinite;}
  @keyframes card-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,0.3);}50%{box-shadow:0 0 0 6px rgba(255,59,92,0);}}
  .device-name{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .device-status-badge{font-size:10px;font-family:'Share Tech Mono',monospace;padding:2px 6px;border-radius:4px;font-weight:700;}
  .badge-active{background:rgba(255,59,92,0.2);color:var(--danger);}
  .badge-ok{background:rgba(0,232,150,0.15);color:var(--success);}
  .device-coords{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:4px;}
  .device-timer{font-size:12px;color:var(--warning);font-family:'Share Tech Mono',monospace;margin-top:6px;display:none;}
  .device-card.alerting .device-timer{display:block;}
  .device-last{font-size:11px;color:var(--muted);margin-top:4px;}
  .config-panel{padding:14px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
  .config-row{display:flex;justify-content:space-between;margin-bottom:5px;}
  .config-val{color:var(--accent);}
  #map{flex:1;}
  .alert-panel{position:fixed;top:65px;right:16px;width:280px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
  .alert-toast{background:var(--panel);border:1px solid var(--danger);border-left:4px solid var(--danger);border-radius:8px;padding:12px 14px;pointer-events:all;animation:slide-in 0.3s ease;box-shadow:0 4px 20px rgba(255,59,92,0.3);}
  @keyframes slide-in{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .toast-title{font-size:13px;font-weight:700;color:var(--danger);display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .toast-body{font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
  .toast-countdown{height:3px;background:var(--border);border-radius:99px;margin-top:8px;overflow:hidden;}
  .toast-bar{height:100%;background:var(--danger);border-radius:99px;transition:width 1s linear;}
  .timer-display{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(255,59,92,0.15);border:1px solid var(--danger);border-radius:99px;padding:7px 20px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--danger);z-index:2000;display:none;backdrop-filter:blur(8px);}
  .timer-display.visible{display:block;}
  .marker-pulse{width:40px;height:40px;border-radius:50%;background:var(--danger);border:3px solid white;box-shadow:0 0 0 0 rgba(255,59,92,0.7);animation:marker-ring 1s ease infinite;display:flex;align-items:center;justify-content:center;font-size:18px;}
